version: '3.8'

# ==============================================================================
# LOCAL TESTING & ENVIRONMENT VARIABLES GUIDE
# ==============================================================================
# By default, the services below (server, ai-service, etl-pipeline) are set to 
# use `env_file: .env` from their respective directories. 
# This means they will read the `DATABASE_URL` (which currently points to AWS RDS)
# directly from `server/.env`.
#
# If you want to use the LOCAL postgres container (defined below) instead of AWS,
# change the `DATABASE_URL` inside `server/.env` to:
# DATABASE_URL="postgresql://postgres:postgres@db:5432/library_db?schema=public"
#
# Previously, we hardcoded `DATABASE_URL` here under the `environment` section, 
# but doing so overrides your `.env` files and can cause connection issues if the 
# local db is empty while you expect cloud data. Relying on `env_file` is much safer!
# ==============================================================================

services:
  # LOCAL POSTGRESQL DATABASE
  # Only used if you change your DATABASE_URL in your .env files to point to `db:5432`
  db:
    image: postgres:15
    container_name: lms-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-library_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: lms-server
    env_file:
      - ./server/.env
    environment:
      # Uncomment the line below to explicitly use the local database, overriding the .env file
      # DATABASE_URL: postgresql://postgres:postgres@db:5432/library_db?schema=public
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      CRON_SECRET_KEY: ${CRON_SECRET_KEY:-dummy_secret}
    ports:
      - "5000:5000"
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: lms-client
    ports:
      - "80:80"
    depends_on:
      - server

  ai-service:
    build:
      context: ./ai-service
    container_name: lms-ai-service
    env_file:
      - ./ai-service/.env
    environment:
      # Uncomment the line below to explicitly use the local database, overriding the .env file
      # DATABASE_URL: postgresql://postgres:postgres@db:5432/library_db?schema=public
      PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy

  etl-pipeline:
    build:
      context: ./etl-pipeline
    container_name: lms-etl
    env_file:
      - ./etl-pipeline/.env
    environment:
      # Uncomment the line below to explicitly use the local database, overriding the .env file
      # DATABASE_URL: postgresql://postgres:postgres@db:5432/library_db?schema=public
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
