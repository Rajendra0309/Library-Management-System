version: '3.8'

services:
  db:
    image: postgres:15
    container_name: lms-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-library_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: lms-server
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-library_db}?schema=public
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      CRON_SECRET_KEY: ${CRON_SECRET_KEY:-dummy_secret}
    ports:
      - "5000:5000"
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: lms-client
    ports:
      - "80:80"
    depends_on:
      - server

  ai-service:
    build:
      context: ./ai-service
    container_name: lms-ai-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-library_db}?schema=public
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy

  etl-pipeline:
    build:
      context: ./etl-pipeline
    container_name: lms-etl
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-library_db}?schema=public
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
